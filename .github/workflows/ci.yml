name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_call:

jobs:
  lint:
    name: Lint & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Formatting (Prettier)
        run: npx prettier --check "src/**/*.liquid" "src/**/*.yml"

      - name: Run Linter (Shopify Theme Check)
        run: npm run lint
