version: '3'

tasks:
  lint:
    desc: Run Shopify Theme Check linter on Liquid files
    cmds:
      - shopify theme check

  format:
    desc: Run Prettier formatting on source templates and configurations
    cmds:
      - npx prettier --write "src/**/*.liquid" "src/**/*.yml"

  serve:
    desc: Run local TRMNL preview server using Docker container
    env:
      APP_ENV: production
      RACK_ENV: production
    preconditions:
      - which trmnlp
    # dir: ./src
    cmds:
      - trmnlp serve -b 0.0.0.0
