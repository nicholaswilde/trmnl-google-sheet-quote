version: '3'

tasks:
  bootstrap:
    desc: Bootstrap the local development environment (install dependencies and config)
    cmds:
      - bundle install
      - npm install
      - task: init

  init:
    desc: Initialize local configuration file from template
    status:
      - test -f .trmnlp.yml
    cmds:
      - cp .trmnlp.yml.example .trmnlp.yml

  lint:
    desc: Run Shopify Theme Check linter on Liquid files
    cmds:
      - shopify theme check

  format:
    desc: Run Prettier formatting on source templates and configurations
    cmds:
      - npx prettier --write "src/**/*.liquid" "src/**/*.yml"

  serve:
    desc: Run local TRMNL preview server using Docker container
    env:
      APP_ENV: production
      RACK_ENV: production
    preconditions:
      - which trmnlp
    # dir: ./src
    cmds:
      - trmnlp serve -b 0.0.0.0

  verify-framework:
    desc: Verify framework_version in settings.yml
    cmds:
      - ruby .agents/skills/trmnl_framework/scripts/manage_framework.rb verify 3.1

  update-framework:
    desc: Update framework_version in settings.yml
    cmds:
      - ruby .agents/skills/trmnl_framework/scripts/manage_framework.rb update {{.CLI_ARGS}}
